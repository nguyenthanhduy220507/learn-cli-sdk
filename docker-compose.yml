version: "3.8"

services:
  mycli:
    # Team khác pull image từ registry nội bộ, không cần build
    image: registry.internal.company.com/platform/mycli:latest

    # Nếu đang dev local thì dùng dòng này thay thế:
    # build: .

    # Cho phép mount thư mục từ máy host vào container
    # để CLI có thể đọc/ghi file trên máy của user
    volumes:
      - ./data:/data

    # Cho phép truyền biến môi trường vào CLI
    environment:
      - ENV=production
      - LOG_LEVEL=info
