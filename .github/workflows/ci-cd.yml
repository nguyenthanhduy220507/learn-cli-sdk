name: CI/CD — Build & Push CLI Docker Image

# ================================================================
# KHI NÀO WORKFLOW NÀY CHẠY?
# ================================================================
on:
  # 1. Push code lên nhánh main hoặc develop → chạy CI (test + build)
  push:
    branches:
      - main
      - develop

  # 2. Tạo Pull Request vào main → chỉ chạy CI (không push image)
  pull_request:
    branches:
      - main

  # 3. Tạo git tag dạng v1.0.0 → chạy CI + CD (build + push image)
  # Đây là trigger chính để release version mới
  push:
    tags:
      - "v*.*.*"   # v1.0.0, v2.1.3, v0.0.1, ...

# ================================================================
# BIẾN DÙNG CHUNG TRONG TOÀN BỘ WORKFLOW
# ================================================================
env:
  # Tên image trên registry
  # Thay "your-org" bằng GitHub username hoặc org của bạn
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mycli

# ================================================================
# CÁC JOBS
# ================================================================
jobs:

  # ------------------------------------------------------------
  # JOB 1: TEST
  # Chạy unit test trước khi build image
  # ------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Run CLI smoke test
        run: |
          mycli --help
          mycli hello --name "CI"
          mycli info --json

  # ------------------------------------------------------------
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # Chỉ chạy sau khi test pass
  # ------------------------------------------------------------
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test   # Phải pass test trước mới build

    # Cần quyền ghi vào GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Lấy source code về ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Tính toán tags cho image ────────────────────────
      # Action này tự động tạo tags phù hợp dựa trên trigger:
      #   push main     → ghcr.io/.../mycli:main
      #   push v1.2.3   → ghcr.io/.../mycli:1.2.3 + :1.2 + :1 + :latest
      #   pull request  → ghcr.io/.../mycli:pr-42
      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Branch push → tag bằng tên branch
            type=ref,event=branch
            # PR → tag pr-<number>
            type=ref,event=pr
            # Git tag v1.2.3 → tag 1.2.3, 1.2, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Luôn có tag "latest" khi push lên main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── 3. Login vào GitHub Container Registry ─────────────
      # GITHUB_TOKEN được tự động tạo, không cần setup gì thêm
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Setup Buildx (hỗ trợ multi-platform & cache) ───
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build và push image ─────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # Hỗ trợ cả Intel và Apple Silicon
          # Chỉ push khi KHÔNG phải PR (PR chỉ build để test Dockerfile)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layer để build nhanh hơn lần sau
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. In ra digest của image vừa push ─────────────────
      - name: Print image digest
        run: echo "✅ Image pushed with digest ${{ steps.build-and-push.outputs.digest }}"

  # ------------------------------------------------------------
  # JOB 3: VERIFY (chỉ chạy khi push tag - tức là đang release)
  # Pull image về và chạy thử để confirm image hoạt động
  # ------------------------------------------------------------
  verify-release:
    name: Verify released image
    runs-on: ubuntu-latest
    needs: build-and-push
    # Chỉ chạy khi tạo git tag (release)
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull và test image vừa release
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "Testing image: $IMAGE"
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" --help
          docker run --rm "$IMAGE" hello --name "Release Bot"
          docker run --rm "$IMAGE" info --json
          echo "✅ Image verified!"

      - name: Kiểm tra source code không bị lộ
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "=== Kiểm tra file .py trong image ==="
          # Tìm file .py - chỉ được phép thấy file của Python runtime
          # KHÔNG được thấy mycli/main.py hay setup.py
          LEAKED=$(docker run --rm --entrypoint sh "$IMAGE" \
            -c "find / -path /usr -prune -o -name '*.py' -print 2>/dev/null" \
            | grep -v "^/usr" | grep -v "^$" || true)
          if echo "$LEAKED" | grep -q "main.py\|setup.py"; then
            echo "❌ SOURCE CODE BỊ LỘ! Kiểm tra lại Dockerfile!"
            echo "$LEAKED"
            exit 1
          else
            echo "✅ Source code được bảo vệ tốt!"
          fi
