name: CI/CD — Build & Push CLI Docker Image

# ================================================================
# KHI NÀO WORKFLOW NÀY CHẠY?
# ================================================================
on:
  # 1. Push code lên nhánh main/develop hoặc tạo tag v1.0.0
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"

  # 2. Tạo Pull Request vào main
  pull_request:
    branches:
      - main

# ================================================================
# BIẾN DÙNG CHUNG TRONG TOÀN BỘ WORKFLOW
# ================================================================
env:
  # Tên image trên registry
  # Thay "your-org" bằng GitHub username hoặc org của bạn
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mycli

# ================================================================
# CÁC JOBS
# ================================================================
jobs:
  # ------------------------------------------------------------
  # JOB 1: TEST
  # Chạy unit test trước khi build image
  # ------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run CLI smoke test
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m mycli --help
          python -m mycli hello --name "CI"
          python -m mycli info --json

  # ------------------------------------------------------------
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # Chỉ chạy sau khi test pass
  # ------------------------------------------------------------
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GHCR requires lowercase image names
      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            # Giữ nguyên tag gốc (có v1.0.1)
            type=ref,event=tag
            # Tạo tag chuẩn semver (1.0.1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── 6. In ra digest của image vừa push ─────────────────
      - name: Print image digest
        run: echo "✅ Image pushed with digest ${{ steps.build-and-push.outputs.digest }}"

  # ------------------------------------------------------------
  # JOB 3: VERIFY (chỉ chạy khi push tag - tức là đang release)
  # Pull image về và chạy thử để confirm image hoạt động
  # ------------------------------------------------------------
  verify-release:
    name: Verify released image
    runs-on: ubuntu-latest
    needs: build-and-push
    # Chỉ chạy khi tạo git tag (release)
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull và test image vừa release
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "Testing image: $IMAGE"
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" --help
          docker run --rm "$IMAGE" hello --name "Release Bot"
          docker run --rm "$IMAGE" info --json
          echo "✅ Image verified!"

      - name: Kiểm tra source code không bị lộ
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "=== Kiểm tra file .py trong image ==="
          # Tìm file .py - chỉ được phép thấy file của Python runtime
          # KHÔNG được thấy mycli/main.py hay setup.py
          LEAKED=$(docker run --rm --entrypoint sh "$IMAGE" \
            -c "find / -path /usr -prune -o -name '*.py' -print 2>/dev/null" \
            | grep -v "^/usr" | grep -v "^$" || true)
          if echo "$LEAKED" | grep -q "main.py\|setup.py"; then
            echo "❌ SOURCE CODE BỊ LỘ! Kiểm tra lại Dockerfile!"
            echo "$LEAKED"
            exit 1
          else
            echo "✅ Source code được bảo vệ tốt!"
          fi
